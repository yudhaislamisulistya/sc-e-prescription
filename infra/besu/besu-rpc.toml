# infra/besu/besu-rpc.toml
#
# Hyperledger Besu IBFT 2.0 RPC node config (consortium / free-gas).
# Mounted into the besu-rpc container at /cfg/besu-rpc.toml.
# This node is a non-validating member that exposes JSON-RPC to the app-net
# services (nextjs-app, indexer, kms-signer) and to the host on port 8545.

data-path = "/data/besu-rpc"
genesis-file = "/cfg/genesis.json"

# P2P (distinct port from the validator so both can run side-by-side).
p2p-port = 30304

# Peering: this member node must dial the validator to receive sealed blocks.
# The validator enode is host-specific (it embeds the validator node id, known
# only after key generation), so generate-keys.sh writes a static-nodes.json
# which docker-compose mounts into this node's data-path
# (/data/besu-rpc/static-nodes.json) — Besu auto-loads it from there.
# The enode host is the compose service DNS name "besu-validator"; enable DNS so
# Besu resolves it to the container IP at dial time. Xdns-* govern OUTBOUND enode
# resolution only and do NOT require relaxing the inbound Host-header check.
Xdns-enabled = true
Xdns-update-enabled = true
# host-allowlist gates the inbound HTTP Host header. A wildcard ["*"] enables DNS
# rebinding against the RPC, so restrict it to the names clients actually use:
# the compose service DNS name and loopback (host tooling / Hardhat).
host-allowlist = ["besu-rpc", "localhost", "127.0.0.1"]

# JSON-RPC. ADMIN/DEBUG/MINER are intentionally NOT exposed. CORS is restricted
# to the app origin (the app calls RPC server-side; browser dApps use this list).
rpc-http-enabled = true
rpc-http-host = "0.0.0.0"
rpc-http-port = 8545
rpc-http-api = ["ETH", "NET", "WEB3", "IBFT"]
rpc-http-cors-origins = ["http://localhost:3000"]

# Free-gas consortium: report/accept a zero gas price so dApp clients and
# Hardhat ("besu" network, gasPrice: 0) can submit zero-cost transactions.
min-gas-price = 0

logging = "INFO"
