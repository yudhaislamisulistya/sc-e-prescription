# infra/besu/besu-rpc.toml
#
# Hyperledger Besu IBFT 2.0 RPC node config (consortium / free-gas).
# Mounted into the besu-rpc container at /cfg/besu-rpc.toml.
# This node is a non-validating member that exposes JSON-RPC to the app-net
# services (nextjs-app, indexer, kms-signer) and to the host on port 8545.

data-path = "/data/besu-rpc"
genesis-file = "/cfg/genesis.json"

# P2P (distinct port from the validator so both can run side-by-side).
p2p-port = 30304

# JSON-RPC
rpc-http-enabled = true
rpc-http-host = "0.0.0.0"
rpc-http-port = 8545
rpc-http-api = ["ETH", "NET", "WEB3", "IBFT"]
rpc-http-cors-origins = ["*"]

# Free-gas consortium: report/accept a zero gas price so dApp clients and
# Hardhat ("besu" network, gasPrice: 0) can submit zero-cost transactions.
min-gas-price = 0

logging = "INFO"
