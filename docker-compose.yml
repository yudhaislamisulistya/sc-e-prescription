# docker-compose.yml
# ---------------------------------------------------------------------------
# Smart-contract e-prescription consortium stack.
#
# Hyperledger Besu IBFT 2.0 (free-gas: min-gas-price=0 / gasPrice 0) +
# Postgres read-model, Redis, IPFS (encrypted-blob storage), an event indexer,
# a KMS signer service, and the Next.js app.
#
# Before first boot, generate validator/deployer keys and substitute the
# genesis placeholders:  bash infra/besu/generate-keys.sh
# (genesis.json ships with JSON-valid placeholder strings so it still parses.)
#
# NOTE: services/* build contexts (indexer, kms-signer) and secrets/*.txt are
# provided by other tasks / by the operator at deploy time. The secrets/
# directory is committed empty (.gitkeep) and gitignored — real secret values
# must never be committed.
#
# Postgres credentials: the database password is a Docker FILE secret
# (secrets/pg_password.txt -> /run/secrets/pg_password). The DB server reads it
# via POSTGRES_PASSWORD_FILE; every consumer reads the SAME file at runtime
# (lib/pg-pool.ts) and supplies PGHOST/PGUSER/PGDATABASE for the rest. The
# password is never placed in an env var or a DATABASE_URL, so it stays out of
# `docker inspect` and cannot be URL-injection-mangled. Create it before boot:
#   openssl rand -hex 24 > secrets/pg_password.txt
# ---------------------------------------------------------------------------
version: "3.8"

services:
  # --- Blockchain: sealing validator (no public RPC) --------------------------
  besu-validator:
    image: hyperledger/besu:24.10
    container_name: epx-besu-validator
    command: ["--config-file=/cfg/besu-validator.toml"]
    volumes:
      - ./infra/besu/besu-validator.toml:/cfg/besu-validator.toml:ro
      - ./infra/besu/genesis.json:/cfg/genesis.json:ro
      - ./infra/besu/validator-key:/cfg/key:ro
      - besu-validator-data:/data
    ports:
      - "30303:30303"
    networks: [consortium-net]
    restart: unless-stopped

  # --- Blockchain: JSON-RPC member node (free-gas, app-facing) ----------------
  besu-rpc:
    image: hyperledger/besu:24.10
    container_name: epx-besu-rpc
    command: ["--config-file=/cfg/besu-rpc.toml"]
    volumes:
      - ./infra/besu/besu-rpc.toml:/cfg/besu-rpc.toml:ro
      - ./infra/besu/genesis.json:/cfg/genesis.json:ro
      # Static peering: Besu auto-loads static-nodes.json from its data-path
      # (/data/besu-rpc) so this RPC node dials the validator and receives sealed
      # blocks. Generated host-side by `bash infra/besu/generate-keys.sh`
      # (gitignored, host-specific enode). Without it the RPC node never peers.
      - ./infra/besu/static-nodes.json:/data/besu-rpc/static-nodes.json:ro
      - besu-rpc-data:/data
    ports:
      # Loopback-only host bind: reachable by host tooling (Hardhat) but not the
      # LAN. In-cluster services reach RPC via app-net DNS (besu-rpc:8545).
      - "127.0.0.1:8545:8545"
    networks: [consortium-net, app-net]
    depends_on: [besu-validator]
    restart: unless-stopped

  # --- Read-model database ----------------------------------------------------
  postgres:
    image: postgres:16
    container_name: epx-postgres
    environment:
      POSTGRES_DB: eprescription
      POSTGRES_USER: app
      # Password read from the mounted Docker file secret (never an env default).
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./services/indexer/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks: [app-net]
    secrets: [pg_password]
    restart: unless-stopped

  # --- Cache / queue ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: epx-redis
    networks: [app-net]
    restart: unless-stopped

  # --- Off-chain encrypted blob storage --------------------------------------
  ipfs:
    image: ipfs/kubo:v0.26.0
    container_name: epx-ipfs
    volumes:
      - ipfs-data:/data/ipfs
    ports:
      # Kubo admin API (5001) is unauthenticated + powerful — loopback only.
      - "127.0.0.1:5001:5001"
      - "8080:8080"
    networks: [app-net]
    restart: unless-stopped

  # --- IPFS pinning cluster (OPTIONAL: enable with `--profile cluster`) -------
  ipfs-cluster:
    image: ipfs/ipfs-cluster:v1.0.8
    container_name: epx-ipfs-cluster
    profiles: ["cluster"]
    environment:
      CLUSTER_PEERNAME: epx-cluster-0
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/ipfs/tcp/5001
      CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9094
      CLUSTER_SECRET_FILE: /run/secrets/ipfs_cluster_secret
    volumes:
      - ipfs-cluster-data:/data/ipfs-cluster
    ports:
      - "9094:9094"
    depends_on: [ipfs]
    networks: [app-net]
    secrets: [ipfs_cluster_secret]
    restart: unless-stopped

  # --- Chain -> Postgres event indexer ---------------------------------------
  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    container_name: epx-indexer
    environment:
      RPC_URL: http://besu-rpc:8545
      # DB: host/user/db via PG* env; password read from the pg_password file
      # secret by lib/pg-pool.ts — never embedded in a URL.
      PGHOST: postgres
      PGUSER: app
      PGDATABASE: eprescription
      REDIS_URL: redis://redis:6379
      # REQUIRED: index.ts throws "PRESCRIPTION_REGISTRY_ADDRESS not set" at
      # startup without this, and `restart: unless-stopped` would crash-loop it
      # forever. Set it in the gitignored .env after deploying the contracts.
      PRESCRIPTION_REGISTRY_ADDRESS: ${PRESCRIPTION_REGISTRY_ADDRESS:?set PRESCRIPTION_REGISTRY_ADDRESS in .env (deployed PrescriptionRegistry address)}
      # Skip scanning from genesis on a fresh DB: start at the contract's deploy
      # block. Defaults to 0 (whole chain) if unset.
      START_BLOCK: ${START_BLOCK:-0}
      # Confirmation lag behind the unfinalized tip (0 is safe on Besu IBFT 2.0).
      CONFIRMATIONS: ${INDEXER_CONFIRMATIONS:-0}
    depends_on: [besu-rpc, postgres]
    networks: [app-net]
    secrets: [pg_password]
    restart: unless-stopped

  # --- Custodial signer (server-side key custody) -----------------------------
  kms-signer:
    build:
      context: .
      dockerfile: services/kms-signer/Dockerfile
    container_name: epx-kms-signer
    environment:
      # Keep the dev-only patient-key env fallback HARD-DISABLED in this stack:
      # the service throws if it reaches getPatientPrivKey under production, so a
      # raw patient key can never live in the service env. Override to a dev
      # value only when wiring real HSM/KMS-less local testing.
      NODE_ENV: production
      RPC_URL: http://besu-rpc:8545
      # Code reads KMS_PORT (PORT is a secondary fallback); set both for clarity.
      KMS_PORT: "4000"
      # Authoritative identity contract: used to verify the pharmacist's ACTIVE
      # PHARMACIST_ROLE and to fetch the on-chain encryption pubkey that the CEK
      # is re-wrapped to. Without this the wrap target would be caller-controlled.
      IDENTITY_REGISTRY_ADDRESS: ${IDENTITY_REGISTRY_ADDRESS:?set IDENTITY_REGISTRY_ADDRESS in .env (deployed IdentityRegistry address)}
      # The single KeyAccessRegistry the custodian EOA is allowed to call. Pinned
      # here so the service never signs grantAccess to a caller-supplied address.
      KEY_ACCESS_REGISTRY_ADDRESS: ${KEY_ACCESS_REGISTRY_ADDRESS:?set KEY_ACCESS_REGISTRY_ADDRESS in .env (deployed KeyAccessRegistry address)}
      # KMS_SERVICE_KEY and KMS_INTERNAL_TOKEN are provided as FILE secrets below;
      # the service reads /run/secrets/<name> directly (no env export needed).
    depends_on: [besu-rpc, postgres]
    networks: [app-net]
    secrets: [kms_service_key, kms_internal_token]
    restart: unless-stopped

  # --- Next.js application -----------------------------------------------------
  nextjs-app:
    build: .
    container_name: epx-nextjs-app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CHAIN_ID: "1337"
      RPC_URL: http://besu-rpc:8545
      # DB: host/user/db via PG* env; password from the pg_password file secret
      # (lib/pg-pool.ts) — never embedded in a URL.
      PGHOST: postgres
      PGUSER: app
      PGDATABASE: eprescription
      REDIS_URL: redis://redis:6379
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: http://ipfs:8080
      KMS_SIGNER_URL: http://kms-signer:4000
      IDENTITY_REGISTRY_ADDRESS: ${IDENTITY_REGISTRY_ADDRESS:?set IDENTITY_REGISTRY_ADDRESS in .env (deployed IdentityRegistry address)}
      # prepare/submit bind the doctor's EIP-712 signature to this registry.
      PRESCRIPTION_REGISTRY_ADDRESS: ${PRESCRIPTION_REGISTRY_ADDRESS:?set PRESCRIPTION_REGISTRY_ADDRESS in .env (deployed PrescriptionRegistry address)}
    ports:
      - "3000:3000"
    depends_on: [besu-rpc, postgres, redis, indexer]
    networks: [app-net]
    # The app is the only legitimate caller of kms-signer; it presents the shared
    # internal token (read from this file secret) as the Bearer credential. It
    # also reads the DB read-model, so it gets the pg_password file secret.
    secrets: [kms_internal_token, pg_password]
    restart: unless-stopped

networks:
  consortium-net:
    driver: bridge
  app-net:
    driver: bridge

volumes:
  besu-validator-data: {}
  besu-rpc-data: {}
  pg-data: {}
  ipfs-data: {}
  ipfs-cluster-data: {}

secrets:
  # Postgres password — file secret shared by the DB server and every consumer
  # (read at runtime by lib/pg-pool.ts). Create before first boot, e.g.
  # `openssl rand -hex 24 > secrets/pg_password.txt`.
  pg_password:
    file: ./secrets/pg_password.txt
  kms_service_key:
    file: ./secrets/kms_service_key.txt
  # Shared bearer token for server-to-server calls to the kms-signer
  # /grant-access endpoint. Generate a high-entropy value (e.g.
  # `openssl rand -hex 32 > secrets/kms_internal_token.txt`) before first boot.
  kms_internal_token:
    file: ./secrets/kms_internal_token.txt
  ipfs_cluster_secret:
    file: ./secrets/ipfs_cluster_secret.txt
